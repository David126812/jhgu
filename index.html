<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CoPro Pilot</title>
    <meta name="description" content="Gérez les dossiers de votre copropriété en quelques secondes" />

    <!-- PWA -->
    <link rel="manifest" href="/jhgu/manifest.json" />
    <meta name="theme-color" content="#2563eb" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoPro Pilot" />
    <link rel="apple-touch-icon" href="/jhgu/icon-192.svg" />

    <!-- OG -->
    <meta property="og:title" content="CoPro Pilot" />
    <meta property="og:description" content="Gérez les dossiers de votre copropriété en quelques secondes" />
    <meta property="og:type" content="website" />
  </head>

  <body style="margin:0;min-height:100vh">
    <script>
      // Handle SPA redirects from 404.html
      (function() {
        var q = window.location.search;
        if (q.indexOf('?p=') === 0) {
          var path = decodeURIComponent(q.slice(3));
          window.history.replaceState(null, '', path);
        }
      })();
    </script>
    <div id="root" style="min-height:100vh"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
